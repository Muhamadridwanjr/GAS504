<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a12"/>
      <stop offset="100%" style="stop-color:#0f0f1e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a017"/>
      <stop offset="100%" style="stop-color:#f5c842"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a017;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#d4a017;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow orb -->
  <ellipse cx="600" cy="200" rx="400" ry="200" fill="url(#glow)" filter="url(#blur)" opacity="0.6"/>

  <!-- Grid lines -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Border -->
  <rect width="1200" height="630" fill="none" stroke="rgba(212,160,23,0.3)" stroke-width="2"/>
  <rect x="8" y="8" width="1184" height="614" fill="none" stroke="rgba(212,160,23,0.1)" stroke-width="1"/>

  <!-- Logo badge -->
  <rect x="60" y="60" width="60" height="60" rx="14" fill="url(#gold)"/>
  <text x="90" y="102" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" fill="#000" text-anchor="middle">G</text>

  <!-- Brand name -->
  <text x="140" y="85" font-family="Arial, sans-serif" font-size="22" font-weight="900" fill="#f5c842" letter-spacing="3">GAS</text>
  <text x="140" y="108" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" letter-spacing="1">GOLDEN AI STRATEGY</text>

  <!-- Main headline -->
  <text x="600" y="240" font-family="Arial Black, sans-serif" font-size="58" font-weight="900" fill="white" text-anchor="middle">AI Trading Terminal</text>
  <text x="600" y="310" font-family="Arial Black, sans-serif" font-size="58" font-weight="900" fill="url(#gold)" text-anchor="middle">Kelas Dunia</text>

  <!-- Subtitle -->
  <text x="600" y="370" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.65)" text-anchor="middle">18 Fitur AI · Forex · Emas · Crypto · Android App</text>

  <!-- Stats row -->
  <g transform="translate(0, 430)">
    <!-- Stat 1 -->
    <rect x="200" y="0" width="160" height="64" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(212,160,23,0.25)" stroke-width="1"/>
    <text x="280" y="26" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="#f5c842" text-anchor="middle">18</text>
    <text x="280" y="46" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)" text-anchor="middle">AI FEATURES</text>

    <!-- Stat 2 -->
    <rect x="390" y="0" width="160" height="64" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(212,160,23,0.25)" stroke-width="1"/>
    <text x="470" y="26" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="#10b981" text-anchor="middle">10K+</text>
    <text x="470" y="46" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)" text-anchor="middle">TRADERS</text>

    <!-- Stat 3 -->
    <rect x="580" y="0" width="160" height="64" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(212,160,23,0.25)" stroke-width="1"/>
    <text x="660" y="26" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="#f5c842" text-anchor="middle">$2.99</text>
    <text x="660" y="46" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)" text-anchor="middle">MULAI DARI/BLN</text>

    <!-- Stat 4 -->
    <rect x="770" y="0" width="160" height="64" rx="12" fill="rgba(255,255,255,0.06)" stroke="rgba(212,160,23,0.25)" stroke-width="1"/>
    <text x="850" y="26" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="#10b981" text-anchor="middle">99.9%</text>
    <text x="850" y="46" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)" text-anchor="middle">UPTIME</text>
  </g>

  <!-- URL badge -->
  <rect x="450" y="565" width="300" height="36" rx="18" fill="rgba(212,160,23,0.15)" stroke="rgba(212,160,23,0.4)" stroke-width="1"/>
  <text x="600" y="588" font-family="Arial, sans-serif" font-size="14" fill="#f5c842" text-anchor="middle" letter-spacing="1">gasstrategyai.xyz</text>
</svg>
