# ──────────────────────────────────────────────────────────────────
#  GAS — Golden AI Strategy — nginx reverse proxy
#  Subdomains: app / api / admin / docs / blog / pricing
# ──────────────────────────────────────────────────────────────────

# ── Shared SSL settings (DRY snippet) ─────────────────────────────
map $host $ssl_cert {
    default                       /etc/letsencrypt/live/gasstrategyai.xyz/fullchain.pem;
}
map $host $ssl_key {
    default                       /etc/letsencrypt/live/gasstrategyai.xyz/privkey.pem;
}

# ── Cloudflare real IP ────────────────────────────────────────────
geo $cloudflare_ip {
    default           0;
    103.21.244.0/22   1;
    103.22.200.0/22   1;
    103.31.4.0/22     1;
    104.16.0.0/13     1;
    104.24.0.0/14     1;
    108.162.192.0/18  1;
    131.0.72.0/22     1;
    141.101.64.0/18   1;
    162.158.0.0/15    1;
    172.64.0.0/13     1;
    173.245.48.0/20   1;
    188.114.96.0/20   1;
    190.93.240.0/20   1;
    197.234.240.0/22  1;
    198.41.128.0/17   1;
}

# ══════════════════════════════════════════════════════════════════
#  HTTP → HTTPS redirect for ALL domains
# ══════════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name gasstrategyai.xyz www.gasstrategyai.xyz
                app.gasstrategyai.xyz
                api.gasstrategyai.xyz
                admin.gasstrategyai.xyz
                docs.gasstrategyai.xyz
                blog.gasstrategyai.xyz
                pricing.gasstrategyai.xyz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ══════════════════════════════════════════════════════════════════
#  MAIN DOMAIN — gasstrategyai.xyz  (React Terminal App)
# ══════════════════════════════════════════════════════════════════
server {
    listen 443 ssl;
    server_name gasstrategyai.xyz www.gasstrategyai.xyz;

    ssl_certificate     /etc/letsencrypt/live/gasstrategyai.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gasstrategyai.xyz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # SEO static files — must be served before React proxy
    location = /sitemap.xml {
        alias /usr/share/nginx/html/landing/sitemap.xml;
        add_header Content-Type application/xml;
    }
    location = /sitemap-main.xml {
        alias /usr/share/nginx/html/landing/sitemap-main.xml;
        add_header Content-Type application/xml;
    }
    location = /robots.txt {
        alias /usr/share/nginx/html/landing/robots.txt;
        add_header Content-Type text/plain;
    }
    location = /google5e7c3d4a2b891f6.html {
        alias /usr/share/nginx/html/landing/google5e7c3d4a2b891f6.html;
    }

    # Content Editor UI
    location = /editor {
        alias /usr/share/nginx/html/editor.html;
        add_header Content-Type text/html;
    }

    # APK download
    location /download/ {
        alias /usr/share/nginx/html/;
        add_header Content-Disposition 'attachment';
        add_header X-Content-Type-Options nosniff;
    }

    location /api/ {
        set $gw http://gas-gateway-api:8000;
        proxy_pass $gw;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /auth/v1/auth/login → gas-auth-service:8001/v1/auth/login (strip /auth prefix)
    location /auth/ {
        set $auth http://gas-auth-service:8001;
        rewrite ^/auth/(.*)$ /$1 break;
        proxy_pass $auth;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /web/ {
        set $web http://gas-web-backend:8005;
        rewrite ^/web/(.*)$ /$1 break;
        proxy_pass $web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 180s;
    }

    location /mt5/ {
        set $mt5 http://gas-mt5-websocket:8110;
        proxy_pass $mt5;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /terminal/ {
        set $gw http://gas-gateway-api:8000;
        proxy_pass $gw;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 180s;
    }

    # React SPA — handles /login /signup /dashboard etc via client-side routing
    location / {
        set $fe http://gas-terminal-frontend:3000;
        proxy_pass $fe;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

