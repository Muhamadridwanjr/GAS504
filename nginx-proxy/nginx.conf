# ══════════════════════════════════════════════════════════════════
#  docs.gasstrategyai.xyz  →  Static docs site
# ══════════════════════════════════════════════════════════════════
server {
    listen 443 ssl;
    server_name docs.gasstrategyai.xyz;

    ssl_certificate     /etc/letsencrypt/live/gasstrategyai.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gasstrategyai.xyz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    real_ip_header CF-Connecting-IP;

    root /usr/share/nginx/html/landing/docs;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    gzip on;
    gzip_types text/css application/javascript application/json text/plain text/xml;

    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

