# ══════════════════════════════════════════════════════════════════
#  api.gasstrategyai.xyz  →  Gateway API
# ══════════════════════════════════════════════════════════════════
server {
    listen 443 ssl;
    server_name api.gasstrategyai.xyz;

    ssl_certificate     /etc/letsencrypt/live/gasstrategyai.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gasstrategyai.xyz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    real_ip_header CF-Connecting-IP;
    resolver 127.0.0.11 valid=10s ipv6=off;

    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;

    location / {
        set $gw http://gas-gateway-api:8000;
        proxy_pass $gw;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}

