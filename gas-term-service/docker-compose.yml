services:
  gas-term-service-api:
    build: .
    container_name: gas-term-service-api
    ports:
      - "8205:8205"
    environment:
      - PORT=8205
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
      - DATABASE_URL=postgresql+asyncpg://postgres:pass@gas-postgres:5432/gas_terminal
      - REDIS_URL=redis://gas-redis:6379/0
      - BILLING_SERVICE_URL=http://gas-billing-service:8004
      - RISK_ENGINE_URL=http://gas-risk-engine:9511
      - JOURNAL_SERVICE_URL=http://gas-journal-service:8107
    networks:
      - gas-network
    restart: always

  gas-term-service-listener:
    build: .
    container_name: gas-term-service-listener
    command: python -m src.workers.status_listener
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
      - DATABASE_URL=postgresql+asyncpg://postgres:pass@gas-postgres:5432/gas_terminal
      - REDIS_URL=redis://gas-redis:6379/0
    networks:
      - gas-network
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"] # Simplified for background worker since no HTTP server
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - gas-term-service-api

networks:
  gas-network:
    external: true
