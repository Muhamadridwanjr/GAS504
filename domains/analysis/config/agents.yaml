domain: analysis
version: "1.0"
description: "Technical analysis, pattern detection, regime classification, and fundamental data aggregation"
agents:
  - name: technical_analysis_agent
    file: agents/technical_analysis_agent.md
    enabled: true
    schedule: "* * * * *"
    priority: 1
    dependencies: []
    triggers:
      - type: schedule
        value: "* * * * *"
      - type: event
        value: "data_ingestion_completed"
      - type: event
        value: "market_open"
      - type: webhook
        value: "/agents/technical-analysis/run"

  - name: pattern_detection_agent
    file: agents/pattern_detection_agent.md
    enabled: true
    schedule: "*/3 * * * *"
    priority: 2
    dependencies:
      - technical_analysis_agent
    triggers:
      - type: schedule
        value: "*/3 * * * *"
      - type: event
        value: "technical_analysis_ready"
      - type: event
        value: "market_open"
      - type: webhook
        value: "/agents/pattern-detection/run"

  - name: regime_classification_agent
    file: agents/regime_classification_agent.md
    enabled: true
    schedule: "*/10 * * * *"
    priority: 2
    dependencies:
      - technical_analysis_agent
    triggers:
      - type: schedule
        value: "*/10 * * * *"
      - type: event
        value: "volatility_spike"
      - type: event
        value: "major_news_released"
      - type: webhook
        value: "/agents/regime-classification/run"

  - name: orderflow_analysis_agent
    file: agents/orderflow_analysis_agent.md
    enabled: true
    schedule: "* * * * *"
    priority: 2
    dependencies:
      - technical_analysis_agent
    triggers:
      - type: schedule
        value: "* * * * *"
      - type: event
        value: "market_open"
      - type: event
        value: "regime_transition_detected"
      - type: webhook
        value: "/agents/orderflow-analysis/run"

  - name: fundamental_data_agent
    file: agents/fundamental_data_agent.md
    enabled: true
    schedule: "0 */6 * * *"
    priority: 3
    dependencies: []
    triggers:
      - type: schedule
        value: "0 */6 * * *"
      - type: event
        value: "calendar_event_completed"
      - type: event
        value: "macro_news_published"
      - type: webhook
        value: "/agents/fundamental-data/run"

  - name: calendar_events_agent
    file: agents/calendar_events_agent.md
    enabled: true
    schedule: "*/30 * * * *"
    priority: 2
    dependencies: []
    triggers:
      - type: schedule
        value: "*/30 * * * *"
      - type: schedule
        value: "*/5 * * * *"
      - type: event
        value: "market_open"
      - type: webhook
        value: "/agents/calendar-events/refresh"

  - name: multi_timeframe_agent
    file: agents/multi_timeframe_agent.md
    enabled: true
    schedule: "*/5 * * * *"
    priority: 1
    dependencies:
      - technical_analysis_agent
      - regime_classification_agent
      - pattern_detection_agent
    triggers:
      - type: schedule
        value: "*/5 * * * *"
      - type: event
        value: "technical_analysis_ready"
      - type: event
        value: "regime_transition_detected"
      - type: webhook
        value: "/agents/multi-timeframe/analyze"
