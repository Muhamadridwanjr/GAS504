domain: market
version: "1.0"
description: "Market data ingestion, feed monitoring, and real-time data quality for all instruments"
agents:
  - name: market_monitor_agent
    file: agents/market_monitor_agent.md
    enabled: true
    schedule: "*/30 * * * * *"
    priority: 1
    dependencies: []
    triggers:
      - type: schedule
        value: "*/30 * * * * *"
      - type: event
        value: "feed_reconnect_requested"
      - type: event
        value: "service_restarted"
      - type: webhook
        value: "/agents/market-monitor/run"

  - name: websocket_health_agent
    file: agents/websocket_health_agent.md
    enabled: true
    schedule: "*/15 * * * * *"
    priority: 1
    dependencies:
      - market_monitor_agent
    triggers:
      - type: schedule
        value: "*/15 * * * * *"
      - type: event
        value: "market_feed_degraded"
      - type: event
        value: "client_connection_error"
      - type: webhook
        value: "/agents/websocket-health/run"

  - name: data_integrity_agent
    file: agents/data_integrity_agent.md
    enabled: true
    schedule: "*/5 * * * *"
    priority: 2
    dependencies:
      - market_monitor_agent
    triggers:
      - type: schedule
        value: "*/5 * * * *"
      - type: event
        value: "data_ingestion_completed"
      - type: event
        value: "market_feed_restored"
      - type: schedule
        value: "5 0 * * *"

  - name: feed_latency_agent
    file: agents/feed_latency_agent.md
    enabled: true
    schedule: "* * * * *"
    priority: 2
    dependencies:
      - market_monitor_agent
      - websocket_health_agent
    triggers:
      - type: schedule
        value: "* * * * *"
      - type: event
        value: "market_feed_degraded"
      - type: event
        value: "high_load_detected"
      - type: webhook
        value: "/agents/feed-latency/run"

  - name: binance_sync_agent
    file: agents/binance_sync_agent.md
    enabled: true
    schedule: "*/5 * * * * *"
    priority: 1
    dependencies:
      - market_monitor_agent
    triggers:
      - type: schedule
        value: "*/5 * * * * *"
      - type: schedule
        value: "* * * * *"
      - type: event
        value: "market_feed_restored"
      - type: event
        value: "symbol_list_updated"
      - type: webhook
        value: "/agents/binance-sync/run"
