syntax = "proto3";

package indicator;

service IndicatorService {
  rpc Calculate(CalculateRequest) returns (CalculateResponse);
}

message OHLC {
  int64 time = 1;
  double open = 2;
  double high = 3;
  double low = 4;
  double close = 5;
  double volume = 6;
}

message IndicatorRequest {
  string name = 1;
  repeated int32 periods = 2;
  map<string, string> params = 3;
}

message CalculateRequest {
  string symbol = 1;
  string timeframe = 2;
  repeated OHLC ohlc = 3;
  repeated IndicatorRequest indicators = 4;
  map<string, string> options = 5;
}

message IndicatorResult {
  string name = 1;
  int32 period = 2;
  repeated double values = 3;
  repeated int64 timestamps = 4;
}

message CalculateResponse {
  repeated IndicatorResult results = 1;
}
