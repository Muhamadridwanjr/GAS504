services:
  gas-notification-service-api:
    build: .
    container_name: gas-notification-service-api
    ports:
      - "8112:8112"
    environment:
      - PORT=8112
      - REDIS_URL=redis://gas-redis:6379
      - INTERNAL_API_KEY=your_internal_api_key_here
      - LOG_LEVEL=INFO
      - ENVIRONMENT=development
    networks:
      - gas-network
    restart: always

  gas-notification-service-worker:
    build: .
    container_name: gas-notification-service-worker
    command: celery -A src.workers.celery_app worker --loglevel=info
    environment:
      - REDIS_URL=redis://gas-redis:6379
      - INTERNAL_API_KEY=your_internal_api_key_here
      - LOG_LEVEL=INFO
      - ENVIRONMENT=development
    networks:
      - gas-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.workers.celery_app inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - gas-notification-service-api

networks:
  gas-network:
    external: true
