    restart: unless-stopped
    ports:
      - "9615:9615"
    environment:
      REDIS_URL: redis://gas-redis:6379/0
      SMC_ENGINE_URL: http://gas-smc-engine:8000
    depends_on:
      gas-redis:
        condition: service_healthy
    networks:
      - gas-network

  # ────────────────────────────────────────────────────────
  # FRONTEND (terminal.gasstrategy.io)
  # ────────────────────────────────────────────────────────
  gas-terminal-frontend:
    build: ./gas-terminal-frontend
    container_name: gas-terminal-frontend
    <<: *common
    depends_on:
      - gas-gateway-api
      - gas-terminal-backend
      - gas-auth-service
      - gas-user-service
      - gas-billing-service

  # ────────────────────────────────────────────────────────
  # EDGE PROXY (Domain + SSL)
  # ────────────────────────────────────────────────────────
  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    <<: *common
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
      - ./nginx-proxy/html:/usr/share/nginx/html:ro
    depends_on:
      - gas-terminal-frontend

  certbot:
    image: certbot/certbot
    container_name: certbot
    <<: *common
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  mt5-exness:
    image: gmag11/metatrader5_vnc:latest
    container_name: mt5-exness
    restart: unless-stopped
    ports:
      - "3001:3000"
      - "8101:8001"
    volumes:
      - mt5_exness_data:/config
    environment:
      - CUSTOM_USER=gas
      - PASSWORD=gas123
    networks:
      - gas-network

volumes:
  gas-pgdata:
    name: gas-pgdata
  mt5_exness_data:
    name: mt5_exness_data
  gas-redis-data:
    name: gas-redis-data

networks:
  gas-network:
    name: gas-network
    driver: bridge
