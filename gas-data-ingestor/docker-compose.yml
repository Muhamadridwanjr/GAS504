services:
  gas-data-ingestor:
    build: .
    container_name: gas-data-ingestor
    restart: unless-stopped
    ports:
      - "9604:9604"
    env_file:
      - .env
    volumes:
      - ./data:/data
    networks:
      - gas-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9604/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  gas-network:
    external: true
    name: gas-network
