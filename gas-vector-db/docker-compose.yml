version: '3.8'

services:
  vector-db:
    build: .
    container_name: gas-vector-db
    ports:
      - "9004:9004"
    environment:
      - PORT=9004
      - CHROMA_HOST=gas-rag-technical-chroma
      - CHROMA_PORT=8000
      - DEFAULT_DIMENSION=1536
    networks:
      - gas-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  gas-network:
    external: true
