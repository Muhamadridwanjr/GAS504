services:
  gas-screener-service:
    build: .
    container_name: gas-screener-service
    restart: unless-stopped
    ports:
      - "9600:9600"
    env_file:
      - .env
    networks:
      - gas-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9600/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  gas-network:
    external: true
    name: gas-network
