server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker internal DNS resolver — required so nginx doesn't crash at startup
    # if any upstream is temporarily unavailable
    resolver 127.0.0.11 valid=15s ipv6=off;

    # Proxy /terminal/* → terminal-backend (WebSocket + HTTP)
    location /terminal/ {
        set $upstream_terminal http://gas-terminal-backend:8085;
        proxy_pass $upstream_terminal;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # Proxy /web/* → gas-web-backend (AI features, billing, payments)
    location /web/ {
        set $upstream_web http://gas-web-backend:8005;
        rewrite ^/web/(.*) /$1 break;
        proxy_pass $upstream_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 150s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 150s;
    }

    # Proxy /auth/* → auth-service (strip /auth prefix)
    location /auth/ {
        set $upstream_auth http://gas-auth-service:8001;
        rewrite ^/auth/(.*) /$1 break;
        proxy_pass $upstream_auth;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy /api/* → gateway
    location /api/ {
        set $upstream_gateway http://gas-gateway-api:8000;
        proxy_pass $upstream_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy /billing-api/* → billing-service (strip prefix)
    location /billing-api/ {
        set $upstream_billing http://gas-billing-service:8004;
        rewrite ^/billing-api/(.*) /$1 break;
        proxy_pass $upstream_billing;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy /binance/* → gas-binance-service (crypto market data)
    location /binance/ {
        set $upstream_binance http://gas-binance-service:9612;
        rewrite ^/binance/(.*) /$1 break;
        proxy_pass $upstream_binance;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # SPA fallback — serve index.html for all non-asset routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
