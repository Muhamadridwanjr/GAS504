server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy /terminal/* → terminal-backend
    location /terminal/ {
        proxy_pass http://gas-terminal-backend:8085;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy /api/* → gateway
    location /api/ {
        proxy_pass http://gas-gateway-api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy /auth/* → auth-service (strip /auth prefix)
    location /auth/ {
        rewrite ^/auth/(.*) /$1 break;
        proxy_pass http://gas-auth-service:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy /billing-api/* → billing-service (strip prefix)
    location /billing-api/ {
        rewrite ^/billing-api/(.*) /$1 break;
        proxy_pass http://gas-billing-service:8004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback — serve index.html for all non-asset routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
