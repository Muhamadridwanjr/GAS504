services:
  gas-risk-engine:
    build: .
    container_name: gas-risk-engine
    ports:
      - "9511:9511"
    environment:
      - PORT=9511
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
      - REDIS_URL=redis://gas-redis:6379
      - MAX_DAILY_DRAWDOWN=5.0
      - MAX_RISK_PER_TRADE=2.0
    networks:
      - gas-network
    restart: always

networks:
  gas-network:
    external: true
