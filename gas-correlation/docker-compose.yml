services:
  gas-correlation:
    build: .
    container_name: gas-correlation
    ports:
      - "9512:9512"
    environment:
      - PORT=9512
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
      - REDIS_URL=redis://gas-redis:6379
      - FEATURE_ENGINE_URL=http://gas-feature-engine:9499
      - CACHE_TTL=60
    networks:
      - gas-network
    restart: always

networks:
  gas-network:
    external: true
