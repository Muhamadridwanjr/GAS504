version: '3.8'

services:
  gas-smc-engine:
    build: .
    container_name: gas-smc-engine
    restart: unless-stopped
    ports:
      - "8006:8000"  # Exposed on port 8006 on host, internal 8000
    env_file:
      - .env
    networks:
      - gas_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  gas_network:
    external: true
    name: gas_network
