services:
  gas-redis:
    image: redis:alpine
    container_name: gas-redis
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - gas-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  gas-gateway-api:
    build: .
    container_name: gas-gateway-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_HOST=gas-redis
    networks:
      - gas-network
    volumes:
      - .:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  gas-network:
    external: true
