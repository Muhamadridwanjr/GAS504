version: '3.8'

services:
  gas-user-db:
    image: postgres:15-alpine
    container_name: gas-user-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-gas_user_db}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - gas-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  gas-user-service:
    build: .
    container_name: gas-user-service
    ports:
      - "127.0.0.1:8002:8002"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@gas-user-db:5432/${POSTGRES_DB:-gas_user_db}
      - APP_NAME=GAS User Service
      - DEBUG=true
      - LOG_LEVEL=INFO
    depends_on:
      gas-user-db:
        condition: service_healthy
    volumes:
      - ./:/app
    networks:
      - gas-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  gas-network:
    driver: bridge

volumes:
  pgdata:
