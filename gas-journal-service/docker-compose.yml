services:
  gas-journal-service:
    build: .
    container_name: gas-journal-service
    ports:
      - "8107:8107"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@gas-user-db:5432/gas_journal
      - REDIS_URL=redis://gas-redis:6379/0
    networks:
      - gas-network
    volumes:
      - .:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8107 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8107/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

networks:
  gas-network:
    external: true
